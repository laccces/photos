<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photographer — Portfolio</title>
  <meta name="description" content="Photography portfolio — selected travel, portrait, and documentary work.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="header-mount"></div>

  <main>
    <section class="hero" aria-label="Featured projects">
      <div class="hero-track"></div>
      <button class="hero-btn prev" aria-label="Previous slide">&#8592;</button>
      <button class="hero-btn next" aria-label="Next slide">&#8594;</button>
      <div class="hero-dots" role="tablist" aria-label="Slide indicators"></div>
    </section>

    <section class="projects-section" id="projects">
      <p class="section-label">Selected Work</p>
      <div class="projects-grid" id="projects-grid"></div>
    </section>
  </main>

  <div id="footer-mount"></div>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
